<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin:0; background:var(--surface-page); font-family:var(--font-sans); color:var(--text-strong); }
  #root { padding:24px; }
  .grp { margin-bottom:24px; }
  .lbl { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.16em; color:var(--text-muted); margin:0 0 12px; }
  .row { display:flex; flex-wrap:wrap; gap:16px; align-items:center; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Wordmark, SectionHeading, Rating, ServiceCard, TestimonialCard, WhatsAppFab } = window.LindaVibranteDesignSystem_9a98cd;
  function Demo(){
    return (
      <div>
        <div className="grp">
          <p className="lbl">Wordmark</p>
          <div className="row">
            <Wordmark size={30} showTag />
            <div style={{background:'var(--ink-900)', padding:'16px 20px', borderRadius:16}}><Wordmark size={26} theme="light" showTag /></div>
          </div>
        </div>
        <div className="grp">
          <p className="lbl">Section heading</p>
          <SectionHeading eyebrow="Nuestros servicios"
            title={<>Tratamientos para<br/><em style={{fontStyle:'italic',color:'var(--leaf-600)'}}>sentirte bien</em></>}
            lead="De la radiofrecuencia Indiba a un buen masaje — cuidados de cerca, en el centro de Vigo." />
        </div>
        <div className="grp">
          <p className="lbl">Rating</p>
          <div className="row"><Rating value={4.6} count={20} size={20} /></div>
        </div>
        <div className="grp">
          <p className="lbl">Service cards</p>
          <div style={{display:'flex', flexDirection:'column', gap:12, maxWidth:480}}>
            <ServiceCard name="Radiofrecuencia Indiba" description="Diatermia para reafirmar y activar la circulación de la piel." duration="45 min" price="40 €" fromPrice badge="Top" />
            <ServiceCard name="Laminado de cejas" description="Cejas peinadas y fijadas con efecto natural durante semanas." duration="40 min" price="30 €" />
          </div>
        </div>
        <div className="grp">
          <p className="lbl">Testimonial</p>
          <div style={{maxWidth:420}}>
            <TestimonialCard quote="Excelente lugar. Profesionales en todo." author="Cliente de Google" meta="Reseña verificada" value={5} />
          </div>
        </div>
        <div className="grp" style={{marginBottom:0}}>
          <p className="lbl">WhatsApp action</p>
          <div className="row"><WhatsAppFab floating={false} /><WhatsAppFab floating={false} expanded={false} /></div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
