<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Linda Vibrante — Estética &amp; bienestar · Vigo</title>
  <meta name="description" content="Centro de estética y bienestar en pleno centro de Vigo, junto a Plaza de España. Tratamientos faciales y corporales, manos y pies, cejas, pestañas y depilación, con trato cercano. Reserva tu cita." />
  <meta name="theme-color" content="#FBF6EF" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500;1,6..72,600&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    html, body { margin: 0; background: #FBF6EF; }
    body { font-family: 'Hanken Grotesk', ui-sans-serif, system-ui, sans-serif; }
  </style>
  <script>
    /* Pre-paint capability classes — flash-free reveals + motion gating. */
    (function () {
      var d = document.documentElement;
      try {
        if (window.matchMedia('(hover: hover) and (pointer: fine)').matches) d.classList.add('can-hover');
        if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) d.classList.add('reduce-motion');
        else d.classList.add('motion');
      } catch (e) { d.classList.add('motion'); }
    })();
  </script>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
