<!-- @dsCard group="Components" viewport="700x560" name="Core — buttons, badges, inputs" subtitle="Buttons · IconButtons · Badges · Chips · Avatars · Inputs · Cards" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin:0; background:var(--surface-page); font-family:var(--font-sans); color:var(--text-strong); }
  #root { padding:24px; }
  .grp { margin-bottom:22px; }
  .lbl { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.16em; color:var(--text-muted); margin:0 0 12px; }
  .row { display:flex; flex-wrap:wrap; gap:12px; align-items:center; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Button, IconButton, Badge, Chip, Avatar, Input, Card } = window.LindaVibranteDesignSystem_9a98cd;
  const Heart = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M20.8 8.6a5 5 0 0 0-8.8-3 5 5 0 0 0-8.8 3c0 4.6 8.8 9.9 8.8 9.9s8.8-5.3 8.8-9.9z"/></svg>;
  const Arrow = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2"><path d="M5 12h14M13 6l6 6-6 6"/></svg>;
  function Demo(){
    const [cat,setCat] = React.useState('facial');
    return (
      <div>
        <div className="grp">
          <p className="lbl">Buttons</p>
          <div className="row">
            <Button variant="accent" iconRight={<Arrow/>}>Reservar</Button>
            <Button variant="primary">Ver servicios</Button>
            <Button variant="secondary">Cómo llegar</Button>
            <Button variant="ghost">Más info</Button>
          </div>
          <div className="row" style={{marginTop:12}}>
            <Button size="sm" variant="primary">Pequeño</Button>
            <Button size="lg" variant="accent">Grande</Button>
            <Button variant="primary" disabled>Disabled</Button>
          </div>
        </div>
        <div className="grp">
          <p className="lbl">Icon buttons</p>
          <div className="row">
            <IconButton label="me gusta" variant="solid"><Heart/></IconButton>
            <IconButton label="me gusta" variant="soft"><Heart/></IconButton>
            <IconButton label="me gusta" variant="accent"><Heart/></IconButton>
            <IconButton label="me gusta" variant="ghost"><Heart/></IconButton>
          </div>
        </div>
        <div className="grp">
          <p className="lbl">Badges</p>
          <div className="row">
            <Badge tone="accent">Novedad</Badge>
            <Badge tone="leaf" solid>Indiba</Badge>
            <Badge tone="ink">Top ventas</Badge>
            <Badge tone="success" dot>Hoy disponible</Badge>
            <Badge tone="neutral">45 min</Badge>
          </div>
        </div>
        <div className="grp">
          <p className="lbl">Chips (filtro)</p>
          <div className="row">
            {['facial','cuerpo','pestañas','uñas'].map(c =>
              <Chip key={c} selected={cat===c} onClick={()=>setCat(c)}>{c[0].toUpperCase()+c.slice(1)}</Chip>)}
          </div>
        </div>
        <div className="grp">
          <p className="lbl">Avatars</p>
          <div className="row">
            <Avatar name="Ana López" />
            <Avatar name="María R" size={56} />
            <Avatar name="Lucía" ring />
          </div>
        </div>
        <div className="grp" style={{marginBottom:0}}>
          <p className="lbl">Inputs</p>
          <div className="row" style={{alignItems:'flex-start'}}>
            <Input label="Tu nombre" placeholder="Cómo te llamas" style={{width:220}} />
            <Input label="Email" type="email" placeholder="tucorreo@email.com" hint="Solo para newsletter" style={{width:220}} />
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
