<!-- @dsCard group="Colors" viewport="700x170" name="Semantic & states" subtitle="Success, danger, WhatsApp — recognizable, restrained" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--surface-page); font-family:var(--font-sans); color:var(--text-strong); }
  .wrap { padding:24px; }
  .row { display:flex; gap:10px; }
  .sw { flex:1; height:78px; border-radius:var(--radius-md); display:flex; align-items:flex-end; padding:10px; box-sizing:border-box; }
  .sw span { font-size:11px; font-weight:600; color:var(--cream-50); }
  .sw.l span { color:var(--ink-900); }
  .cap { margin-top:12px; font-size:12px; color:var(--text-muted); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="row">
      <div class="sw" style="background:var(--success-600)"><span>--success-600</span></div>
      <div class="sw l" style="background:var(--success-100)"><span>--success-100</span></div>
      <div class="sw" style="background:var(--danger-600)"><span>--danger-600</span></div>
      <div class="sw l" style="background:var(--danger-100)"><span>--danger-100</span></div>
      <div class="sw" style="background:var(--whatsapp)"><span>--whatsapp</span></div>
    </div>
    <p class="cap">El verde de WhatsApp se mantiene de marca para que sea reconocible al instante.</p>
  </div>
</body>
</html>
