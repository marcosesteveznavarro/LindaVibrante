<!-- @dsCard group="Colors" viewport="700x180" name="Cream base & sand" subtitle="The luminous canvas — warm cream and quiet sand hairlines" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--ink-900); font-family:var(--font-sans); color:var(--text-strong); }
  .wrap { padding:24px; }
  .row { display:flex; gap:10px; }
  .sw { flex:1; height:88px; border-radius:var(--radius-md); display:flex; align-items:flex-end; padding:10px; box-sizing:border-box; border:1px solid rgba(0,0,0,0.06); }
  .sw span { font-size:11px; font-weight:600; color:var(--ink-700); }
  .cap { margin-top:12px; font-size:12px; color:var(--text-on-ink-muted); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="row">
      <div class="sw" style="background:var(--white)"><span>--white</span></div>
      <div class="sw" style="background:var(--cream-50)"><span>--cream-50 · page</span></div>
      <div class="sw" style="background:var(--cream-100)"><span>--cream-100</span></div>
      <div class="sw" style="background:var(--sand-200)"><span>--sand-200 · border</span></div>
      <div class="sw" style="background:var(--rose-100)"><span>--rose-100</span></div>
    </div>
    <p class="cap">Base clara, limpia y luminosa. Generoso espacio en blanco cálido sobre el que respira el cítrico.</p>
  </div>
</body>
</html>
