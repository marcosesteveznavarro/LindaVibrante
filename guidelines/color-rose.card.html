<!-- @dsCard group="Colors" viewport="700x180" name="Dusty rose" subtitle="The logo's rosé paper — soft secondary & warm tint washes" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--surface-page); font-family:var(--font-sans); color:var(--text-strong); }
  .wrap { padding:24px; }
  .row { display:flex; gap:10px; }
  .sw { flex:1; height:88px; border-radius:var(--radius-md); display:flex; align-items:flex-end; padding:10px; box-sizing:border-box; }
  .sw span { font-size:11px; font-weight:600; color:var(--wine-800); }
  .sw.d span { color:var(--cream-50); }
  .cap { margin-top:12px; font-size:12px; color:var(--text-muted); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="row">
      <div class="sw" style="background:var(--rose-50)"><span>--rose-50</span></div>
      <div class="sw" style="background:var(--rose-100)"><span>--rose-100 · wash</span></div>
      <div class="sw" style="background:var(--rose-200)"><span>--rose-200</span></div>
      <div class="sw" style="background:var(--rose-400)"><span>--rose-400 · marca</span></div>
      <div class="sw d" style="background:var(--rose-600)"><span>--rose-600</span></div>
    </div>
    <p class="cap">El rosa empolvado del logo aporta calidez femenina: fondos suaves, tarjetas y detalles, sin competir con el burdeos.</p>
  </div>
</body>
</html>
