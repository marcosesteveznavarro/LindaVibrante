<!-- @dsCard group="Type" viewport="700x300" name="Type scale" subtitle="Fluid scale from hero serif down to captions" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--surface-page); font-family:var(--font-sans); color:var(--text-strong); }
  .wrap { padding:24px 28px; display:flex; flex-direction:column; gap:10px; }
  .r { display:flex; align-items:baseline; gap:16px; border-bottom:1px solid var(--border); padding-bottom:9px; }
  .r:last-child { border-bottom:0; }
  .lbl { width:110px; flex:none; font-size:11px; color:var(--text-muted); font-variant-numeric:tabular-nums; }
  .s-display { font-family:var(--font-display); font-weight:600; font-size:46px; line-height:1; letter-spacing:-0.015em; }
  .s-h1 { font-family:var(--font-display); font-weight:600; font-size:32px; line-height:1; }
  .s-h2 { font-weight:700; font-size:24px; letter-spacing:-0.01em; }
  .s-h3 { font-weight:600; font-size:19px; }
  .s-body { font-size:15px; color:var(--text-body); }
  .s-xs { font-size:13px; color:var(--text-muted); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="r"><span class="lbl">display · serif</span><span class="s-display">Aa</span></div>
    <div class="r"><span class="lbl">h1 · serif</span><span class="s-h1">Tu momento de cuidado</span></div>
    <div class="r"><span class="lbl">h2 · sans</span><span class="s-h2">Radiofrecuencia Indiba</span></div>
    <div class="r"><span class="lbl">h3 · sans</span><span class="s-h3">Masajes &amp; bienestar</span></div>
    <div class="r"><span class="lbl">body · sans</span><span class="s-body">Texto base para descripciones y catálogo de servicios.</span></div>
    <div class="r"><span class="lbl">caption · sans</span><span class="s-xs">Horario, notas y metadatos</span></div>
  </div>
</body>
</html>
