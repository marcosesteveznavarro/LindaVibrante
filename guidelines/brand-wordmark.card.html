<!-- @dsCard group="Brand" viewport="700x240" name="Logo & wordmark" subtitle="The real crest + the burgundy typographic lockup" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--surface-page); font-family:var(--font-sans); color:var(--text-strong); }
  .wrap { padding:24px 26px; display:flex; gap:28px; align-items:center; flex-wrap:wrap; }
  .crest { width:170px; height:170px; border-radius:var(--radius-lg); overflow:hidden; box-shadow:var(--shadow-sm); flex:none; }
  .crest img { width:100%; height:100%; object-fit:cover; display:block; }
  .stack { display:flex; flex-direction:column; gap:18px; }
  .lockup { display:flex; flex-direction:column; gap:6px; }
  .name { font-family:var(--font-display); font-weight:600; font-size:30px; text-transform:uppercase; letter-spacing:0.07em; display:flex; align-items:center; gap:11px; color:var(--wine-700); }
  .name .dot { width:8px; height:8px; border-radius:999px; background:var(--lemon-500); display:inline-block; box-shadow:inset 0 0 0 1px rgba(217,180,0,0.5); }
  .tag { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.26em; color:var(--text-muted); }
  .onink { background:var(--wine-900); padding:18px 20px; border-radius:var(--radius-md); }
  .onink .name { color:var(--cream-50); }
  .onink .tag { color:var(--text-on-ink-muted); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="crest"><img src="../assets/logo.png" alt="Logo Linda Vibrante"></div>
    <div class="stack">
      <div class="lockup">
        <span class="name">Linda<span class="dot"></span>Vibrante</span>
        <span class="tag">Centro de estética · Vigo</span>
      </div>
      <div class="onink">
        <div class="lockup">
          <span class="name">Linda<span class="dot"></span>Vibrante</span>
          <span class="tag">Centro de estética · Vigo</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
