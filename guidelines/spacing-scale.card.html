<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing scale" subtitle="4px base · generous editorial rhythm" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--surface-page); font-family:var(--font-sans); color:var(--text-strong); }
  .wrap { padding:24px 28px; display:flex; gap:14px; align-items:flex-end; }
  .col { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .bar { width:34px; background:var(--lemon-300); border-radius:4px; }
  .bar.big { background:var(--lemon-500); }
  .t { font-size:11px; color:var(--text-muted); font-variant-numeric:tabular-nums; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="col"><div class="bar" style="height:8px"></div><span class="t">2 · 8</span></div>
    <div class="col"><div class="bar" style="height:16px"></div><span class="t">4 · 16</span></div>
    <div class="col"><div class="bar" style="height:24px"></div><span class="t">5 · 24</span></div>
    <div class="col"><div class="bar" style="height:32px"></div><span class="t">6 · 32</span></div>
    <div class="col"><div class="bar big" style="height:56px"></div><span class="t">8 · 56</span></div>
    <div class="col"><div class="bar big" style="height:80px"></div><span class="t">9 · 80</span></div>
    <div class="col"><div class="bar big" style="height:112px"></div><span class="t">10 · 112</span></div>
  </div>
</body>
</html>
