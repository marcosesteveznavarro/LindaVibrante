<!-- @dsCard group="Type" viewport="700x230" name="Display — Cormorant Garamond" subtitle="Editorial serif for headings, hero & quotes" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--surface-page); font-family:var(--font-sans); color:var(--text-strong); }
  .wrap { padding:26px 28px; }
  .big { font-family:var(--font-display); font-weight:var(--fw-display-bold); font-size:64px; line-height:0.98; letter-spacing:var(--tracking-display); margin:0; }
  .big em { font-style:italic; font-weight:var(--fw-display-regular); color:var(--leaf-600); }
  .meta { margin-top:14px; display:flex; gap:18px; font-size:12px; color:var(--text-muted); }
  .meta b { color:var(--text-strong); font-weight:600; }
</style>
</head>
<body>
  <div class="wrap">
    <p class="big">Belleza que se<br><em>siente cuidada</em></p>
    <div class="meta">
      <span><b>Cormorant Garamond</b> · 500 / 600</span>
      <span>tracking −0.015em · leading 0.98</span>
      <span>--font-display</span>
    </div>
  </div>
</body>
</html>
