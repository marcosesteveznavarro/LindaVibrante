<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--surface-page); font-family:var(--font-sans); color:var(--text-strong); }
  .wrap { padding:26px 28px; max-width:560px; }
  .lead { font-size:19px; line-height:1.5; font-weight:500; margin:0 0 10px; }
  .p { font-size:15px; line-height:1.6; color:var(--text-body); margin:0; }
  .meta { margin-top:16px; display:flex; gap:18px; font-size:12px; color:var(--text-muted); }
  .meta b { color:var(--text-strong); font-weight:600; }
</style>
</head>
<body>
  <div class="wrap">
    <p class="lead">En Linda Vibrante cuidamos de ti con cercanía y resultados.</p>
    <p class="p">Tratamientos de estética y bienestar en el centro de Vigo. Radiofrecuencia, masajes, faciales y más — reserva en un par de toques.</p>
    <div class="meta">
      <span><b>Hanken Grotesk</b> · 400 / 500 / 600 / 700</span>
      <span>--font-sans</span>
    </div>
  </div>
</body>
</html>
