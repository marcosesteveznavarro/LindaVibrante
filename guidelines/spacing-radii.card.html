<!-- @dsCard group="Spacing" viewport="700x170" name="Radii" subtitle="Soft, organic corners — never sharp, never all-pill" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--surface-page); font-family:var(--font-sans); color:var(--text-strong); }
  .wrap { padding:24px 28px; display:flex; gap:16px; align-items:flex-end; }
  .col { display:flex; flex-direction:column; align-items:center; gap:9px; }
  .box { width:78px; height:64px; background:var(--white); border:1.5px solid var(--border-strong); }
  .t { font-size:11px; color:var(--text-muted); }
  .pill { width:78px; height:42px; background:var(--lemon-500); border-radius:var(--radius-pill); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="col"><div class="box" style="border-radius:var(--radius-sm)"></div><span class="t">sm · 10</span></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-md)"></div><span class="t">md · 16</span></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-lg)"></div><span class="t">lg · 24</span></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-xl)"></div><span class="t">xl · 32</span></div>
    <div class="col"><div class="pill"></div><span class="t">pill · chips/CTA</span></div>
  </div>
</body>
</html>
