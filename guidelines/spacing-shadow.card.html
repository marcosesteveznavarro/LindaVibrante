<!-- @dsCard group="Spacing" viewport="700x190" name="Shadows" subtitle="Soft, warm, ink-green tinted — luminous not heavy" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--surface-page); font-family:var(--font-sans); color:var(--text-strong); }
  .wrap { padding:30px 28px; display:flex; gap:24px; align-items:center; }
  .col { display:flex; flex-direction:column; align-items:center; gap:14px; }
  .box { width:96px; height:64px; background:var(--white); border-radius:var(--radius-md); }
  .acc { background:var(--lemon-500); }
  .t { font-size:11px; color:var(--text-muted); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="col"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span class="t">shadow-sm</span></div>
    <div class="col"><div class="box" style="box-shadow:var(--shadow-md)"></div><span class="t">shadow-md · cards</span></div>
    <div class="col"><div class="box" style="box-shadow:var(--shadow-lg)"></div><span class="t">shadow-lg · float</span></div>
    <div class="col"><div class="box acc" style="box-shadow:var(--shadow-accent)"></div><span class="t">shadow-accent · CTA</span></div>
  </div>
</body>
</html>
