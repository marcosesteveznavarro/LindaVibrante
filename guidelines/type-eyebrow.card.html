<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--surface-page); font-family:var(--font-sans); color:var(--text-strong); }
  .wrap { padding:26px 28px; display:flex; flex-direction:column; gap:14px; }
  .ey { font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:var(--tracking-eyebrow); color:var(--leaf-600); display:flex; align-items:center; gap:10px; }
  .ey::before { content:""; width:22px; height:1.5px; background:var(--lemon-500); display:inline-block; }
  .ey.dim { color:var(--text-muted); }
  .meta { font-size:12px; color:var(--text-muted); }
</style>
</head>
<body>
  <div class="wrap">
    <span class="ey">Estética &amp; bienestar · Vigo</span>
    <span class="ey dim">Nuestros servicios</span>
    <span class="meta">Hanken Grotesk 600 · uppercase · tracking 0.22em · a menudo con regleta limón</span>
  </div>
</body>
</html>
