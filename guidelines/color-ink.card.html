<!-- @dsCard group="Colors" viewport="700x180" name="Burgundy & leaf" subtitle="Deep wine — the brand primary & dark — with citrus-leaf green" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--surface-page); font-family:var(--font-sans); color:var(--text-strong); }
  .wrap { padding:24px; }
  .row { display:flex; gap:10px; }
  .sw { flex:1; height:88px; border-radius:var(--radius-md); display:flex; align-items:flex-end; padding:10px; box-sizing:border-box; }
  .sw span { font-size:11px; font-weight:600; color:var(--cream-50); }
  .sw.l span { color:var(--wine-800); }
  .cap { margin-top:12px; font-size:12px; color:var(--text-muted); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="row">
      <div class="sw" style="background:var(--wine-900)"><span>--wine-900 · dark</span></div>
      <div class="sw" style="background:var(--wine-700)"><span>--wine-700 · primary</span></div>
      <div class="sw" style="background:var(--wine-500)"><span>--wine-500</span></div>
      <div class="sw" style="background:var(--leaf-600)"><span>--leaf-600</span></div>
      <div class="sw l" style="background:var(--leaf-100)"><span>--leaf-100</span></div>
    </div>
    <p class="cap">El burdeos del logo es la marca: titulares, botón primario y secciones inmersivas. El verde hoja, su guiño fresco.</p>
  </div>
</body>
</html>
